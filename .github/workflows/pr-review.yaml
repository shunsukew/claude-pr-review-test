name: PR Review

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Run Claude PR Review
        uses: ./.github/actions/claude-pr-review.yaml
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          anthropic_model: claude-opus-4-6
